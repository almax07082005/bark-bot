name: 'bark-bot-app'

services:
  bark-bot-db:
    container_name: 'bark-bot-db'
    tty: true
    image: 'postgres:18.2'
    environment:
      - 'POSTGRES_DB=bark-bot-db'
      - 'POSTGRES_USER=${DATASOURCE_USERNAME}'
      - 'POSTGRES_PASSWORD=${DATASOURCE_PASSWORD}'
    ports:
      - '${DATASOURCE_HOST_PORT}:${DATASOURCE_CONTAINER_PORT}'
    volumes:
      - 'bark-bot-db-volume:/var/lib/postgresql'
    restart: always

  elasticsearch:
    container_name: 'bark-bot-elasticsearch'
    tty: true
    image: 'docker.elastic.co/elasticsearch/elasticsearch:8.17.4'
    environment:
      - 'discovery.type=single-node'
      - 'xpack.security.enabled=true'
      - 'xpack.security.http.ssl.enabled=false'
      - 'xpack.security.transport.ssl.enabled=false'
      - 'ELASTIC_PASSWORD=${ELASTIC_PASSWORD}'
    volumes:
      - 'bark-bot-elasticsearch-volume:/usr/share/elasticsearch/data'
    restart: always

  logstash:
    container_name: 'bark-bot-logstash'
    tty: true
    image: 'docker.elastic.co/logstash/logstash:8.17.4'
    depends_on:
      - elasticsearch
    environment:
      - 'ELASTIC_PASSWORD=${ELASTIC_PASSWORD}'
    volumes:
      - './logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro'
      - './logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro'
    restart: always

  kibana:
    container_name: 'bark-bot-kibana'
    tty: true
    image: 'docker.elastic.co/kibana/kibana:8.17.4'
    depends_on:
      - elasticsearch
    environment:
      - 'ELASTICSEARCH_HOSTS=http://elasticsearch:9200'
      - 'ELASTICSEARCH_SERVICEACCOUNTTOKEN=${KIBANA_SERVICE_ACCOUNT_TOKEN}'
      - 'XPACK_SECURITY_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}'
      - 'XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_SAVEDOBJECTS_KEY}'
      - 'XPACK_REPORTING_ENCRYPTIONKEY=${KIBANA_REPORTING_KEY}'
    ports:
      - '5601:5601'
    restart: always

  bark-bot-app:
    container_name: 'bark-bot-app'
    tty: true
    image: 'almaxgood/bark-bot:latest'
    env_file:
      - .env
    depends_on:
      - bark-bot-db
      - logstash
    restart: always

volumes:
  bark-bot-db-volume:
  bark-bot-elasticsearch-volume: