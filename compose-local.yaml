name: 'bark-bot-app'

services:
  db:
    container_name: 'bark-bot-db'
    tty: true
    image: 'postgres:18.2'
    environment:
      - 'POSTGRES_DB=bark-bot-db'
      - 'POSTGRES_USER=${DATASOURCE_USERNAME}'
      - 'POSTGRES_PASSWORD=${DATASOURCE_PASSWORD}'
    ports:
      - '${DATASOURCE_HOST_PORT}:${DATASOURCE_CONTAINER_PORT}'
    volumes:
      - 'bark-bot-db-volume:/var/lib/postgresql'

  loki:
    container_name: 'bark-bot-loki'
    image: 'grafana/loki:3.6.0'
    user: '0'
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - './loki/loki-config.yaml:/etc/loki/config.yaml:ro'
      - 'loki-data:/loki'
    ports:
      - '3100:3100'

  alloy:
    container_name: 'bark-bot-alloy'
    image: 'grafana/alloy:v1.14.0'
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    volumes:
      - './loki/alloy-config.alloy:/etc/alloy/config.alloy:ro'
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
      - 'alloy-data:/var/lib/alloy/data'
    depends_on:
      - loki

  grafana:
    container_name: 'bark-bot-grafana'
    image: 'grafana/grafana:11.4.0'
    environment:
      - 'GF_AUTH_ANONYMOUS_ENABLED=true'
      - 'GF_AUTH_ANONYMOUS_ORG_ROLE=Admin'
      - 'GF_PATHS_PROVISIONING=/etc/grafana/provisioning'
    ports:
      - '3000:3000'
    volumes:
      - './grafana/provisioning:/etc/grafana/provisioning:ro'
      - 'grafana-data:/var/lib/grafana'
    depends_on:
      - loki

volumes:
  bark-bot-db-volume:
  loki-data:
  alloy-data:
  grafana-data: